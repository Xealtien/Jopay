            video.muted = false;
            video.play();
            soundBtn.textContent = "🔊 Mute";

            introScreen.classList.add("fade-out");
            setTimeout(() => {
                introScreen.style.display = "none";
            }, 800);
        });

        soundBtn.addEventListener("click", () => {
            video.muted = !video.muted;

            if (video.muted) {
                soundBtn.textContent = "🔇 Unmute";
            } else {
                soundBtn.textContent = "🔊 Mute";
            }

            video.play();
        });

                const data = platformData[platform];

                modalTitle.textContent = data.title;
                modalDescription.textContent = data.description;
                modalDescription2.textContent = data.description2 || "";
                modalDescription2.style.display = data.description2 ? "block" : "none";
                modalLink.href = data.link;
                modalIcon.innerHTML = data.icon;
                modalIcon.style.color = data.color;
                document.getElementById("modal-description2").style.borderLeftColor = data.color;

                modal.style.display = "flex";
            });
        });

        // Close modal
        closeBtn.addEventListener('click', () => {

        });

        // Close when clicking outside
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
